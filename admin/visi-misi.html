<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Visi Misi - Admin SMKN 1 Cikampek</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="berita.html">Berita</a></li>
            <li><a href="prestasi.html">Prestasi</a></li>

            <li><a href="banner.html">Banner</a></li>

            <li><button onclick="logout()">Logout</button></li>
        </ul>
    </nav>

    <main id="content">
        <h1>Pengelolaan Visi, Misi & Tujuan Sekolah</h1>
        <p style="color: #666;">Silakan ubah teks di bawah ini dan klik Simpan Perubahan untuk memperbarui halaman publik.</p>

        <form id="form-visi-misi" style="max-width: 700px; border: 1px solid #ccc; padding: 20px; background: #fafafa;">
            <div>
                <label><b>Visi Sekolah:</b></label><br>
                <textarea id="input-visi" rows="3" style="width: 100%; font-family: Arial, sans-serif;" required placeholder="Tulis visi sekolah..."></textarea>
            </div><br>

            <div>
                <label><b>Misi Sekolah (Tulis per baris / gunakan Enter untuk poin baru):</b></label><br>
                <textarea id="input-misi" rows="8" style="width: 100%; font-family: Arial, sans-serif;" required placeholder="Misi 1&#10;Misi 2"></textarea>
            </div><br>

            <div>
                <label><b>Tujuan Sekolah (Tulis per baris / gunakan Enter untuk poin baru):</b></label><br>
                <textarea id="input-tujuan" rows="8" style="width: 100%; font-family: Arial, sans-serif;" required placeholder="Tujuan 1&#10;Tujuan 2"></textarea>
            </div><br>

            <button type="submit" id="btn-simpan">Simpan Perubahan Visi Misi</button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    
    <script>
        // =========================================================
        // 1. GLOBAL SYSTEM (AUTH & LOGOUT)
        // =========================================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
            }
            return session;
        }
        checkAuth();

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // =========================================================
        // 2. LOGIKA UTAMA: LANGKAH 7 — MODUL KHUSUS VISI MISI
        // =========================================================
        
        // Load data yang ada dari database
        async function loadVisiMisi() {
            const { data, error } = await supabase
                .from('visi_misi')
                .select('*')
                .single(); // hanya 1 record (Single Record Target)

            if (error) {
                console.error("Gagal memuat visi misi:", error.message);
                return;
            }

            if (data) {
                document.getElementById('input-visi').value = data.visi || '';
                
                // Untuk misi dan tujuan yang bertipe array, tampilkan sebagai textarea per baris
                document.getElementById('input-misi').value = data.misi ? data.misi.join('\n') : '';
                document.getElementById('input-tujuan').value = data.tujuan ? data.tujuan.join('\n') : '';
            }
        }

        // Simpan perubahan data ke database
        async function simpanVisiMisi() {
            const btnSimpan = document.getElementById('btn-simpan');
            btnSimpan.disabled = true;
            btnSimpan.innerText = "Menyimpan...";

            const visi = document.getElementById('input-visi').value;
            
            // Konversi textarea baris per baris → array
            const misi = document.getElementById('input-misi').value
                .split('\n')
                .filter(s => s.trim() !== ''); // Membuang baris kosong
                
            const tujuan = document.getElementById('input-tujuan').value
                .split('\n')
                .filter(s => s.trim() !== ''); // Membuang baris kosong

            try {
                // Ambil ID dari record yang ada saat ini
                const { data: existing, error: fetchError } = await supabase
                    .from('visi_misi')
                    .select('id')
                    .single();

                if (fetchError) throw fetchError;

                // Update menggunakan ID tersebut
                const { error: updateError } = await supabase
                    .from('visi_misi')
                    .update({ visi, misi, tujuan })
                    .eq('id', existing.id);

                if (updateError) throw updateError;

                alert('Visi Misi berhasil disimpan!');
            } catch (error) {
                console.error("Proses simpan gagal:", error.message);
                alert("Gagal menyimpan data: " + error.message);
            } finally {
                btnSimpan.disabled = false;
                btnSimpan.innerText = "Simpan Perubahan Visi Misi";
            }
        }

        // Intercept submit form agar tidak merefresh halaman web
        document.getElementById('form-visi-misi').addEventListener('submit', (e) => {
            e.preventDefault();
            simpanVisiMisi();
        });

        // Jalankan pemuatan data otomatis saat halaman diakses oleh admin
        loadVisiMisi();
    </script>
</body>
</html>
