    <main id="content">
        <h1>Update Visi & Misi</h1>
<p><em>Catatan: Pisahkan setiap poin misi dan tujuan dengan baris baru (Enter).</em></p>

<form id="form-visi-misi">
    <div>
        <label>Visi Sekolah:</label><br>
        <textarea id="input-visi" rows="3" style="width: 100%;"></textarea>
    </div>
    <br>
    <div>
        <label>Misi Sekolah (Per Baris):</label><br>
        <textarea id="input-misi" rows="6" style="width: 100%;"></textarea>
    </div>
    <br>
    <div>
        <label>Tujuan Sekolah (Per Baris):</label><br>
        <textarea id="input-tujuan" rows="6" style="width: 100%;"></textarea>
    </div>
    <br>
    <button type="button" onclick="simpanVisiMisi()">Simpan Perubahan</button>
</form>
        </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-client.js"></script>
    
    <script>
        // Letakkan ini di awal <script> setiap halaman admin
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html'; // redirect ke login
            }
            return session;
        }

        // Panggil di setiap halaman admin
        checkAuth();

        // ---------------------------------------------------------
        // Script spesifik halaman (Load data, CRUD) ditulis di bawah ini
        // ---------------------------------------------------------
        
        // ==========================================
        // TARUH FUNGSI LOGOUT DI SINI (DI BAWAH checkAuth)
        // ==========================================
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html'; // Mengalihkan kembali ke halaman login setelah logout
        }
        // ==========================================

        // ---------------------------------------------------------
        // Script spesifik halaman (Load data, CRUD) ditulis di bawah ini
        // ---------------------------------------------------------
    </script>
