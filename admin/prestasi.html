<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Prestasi - Admin SMKN 1 Cikampek</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="berita.html">Berita</a></li>
            <li><a href="prestasi.html">Prestasi</a></li>
            <li><a href="guru.html">Guru & Lulusan</a></li>
            <li><a href="banner.html">Banner</a></li>
            <li><a href="bos.html">Laporan BOS</a></li>
            <li><a href="apbd.html">Laporan APBD</a></li>
            <li><a href="visi-misi.html">Visi Misi</a></li>
            <li><a href="kurikulum.html">Kurikulum</a></li>
            <li><a href="struktur_organisasi.html">Struktur Organisasi</a></li>
            <li><button onclick="logout()">Logout</button></li>
        </ul>
    </nav>

    <main id="content">
        <h1>Pengelolaan Data Prestasi Sekolah & Siswa</h1>
        <button onclick="bukaFormTambah()">+ Tambah Prestasi Baru</button>
        <br><br>

        <div id="area-form" style="display: none; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; max-width: 600px;">
            <h3 id="judul-form">Tambah Prestasi</h3>
            <form id="form-prestasi">
                <input type="hidden" id="prestasi-id">
                
                <div>
                    <label>Judul Prestasi / Nama Perlombaan:</label><br>
                    <input type="text" id="input-judul" required style="width: 100%;" placeholder="Contoh: Juara 1 LKS Otomotif">
                </div><br>
                
                <div>
                    <label>Tingkat Prestasi:</label><br>
                    <select id="input-tingkat" required style="width: 100%; padding: 5px;">
                        <option value="">-- Pilih Tingkat --</option>
                        <option value="Kabupaten">Kabupaten</option>
                        <option value="Provinsi">Provinsi</option>
                        <option value="Nasional">Nasional</option>
                        <option value="Internasional">Internasional</option>
                    </select>
                </div><br>
                
                <div>
                    <label>Tahun Capaian (Angka):</label><br>
                    <input type="number" id="input-tahun" required placeholder="Contoh: 2024" style="width: 150px;">
                </div><br>
                
                <div>
                    <label>Upload Foto Dokumentasi Prestasi:</label><br>
                    <input type="file" id="input-file-foto" accept="image/*" style="width: 100%;">
                    <input type="hidden" id="input-foto">
                    <br>
                    <img id="preview-foto" style="max-width: 200px; margin-top: 10px; display: none; border-radius: 5px; border: 1px solid #ddd;">
                    <small id="status-upload" style="color: blue; display: none; font-weight: bold; margin-top: 5px;"></small>
                </div><br>
                
                <div>
                    <label>Deskripsi (Sertakan juga nama Pemenang di sini):</label><br>
                    <textarea id="input-deskripsi" rows="6" style="width: 100%; font-family: Arial, sans-serif;"></textarea>
                </div><br>
                
                <button type="submit" id="btn-simpan">Simpan Data Prestasi</button>
                <button type="button" onclick="tutupForm()">Batal</button>
            </form>
        </div>

        <table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th>Judul Prestasi</th>
                    <th style="width: 150px; text-align:center;">Tingkat</th>
                    <th style="width: 100px; text-align:center;">Tahun</th>
                    <th style="width: 150px; text-align:center;">Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-prestasi">
            </tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    
    <script>
        // =========================================================
        // 1. GLOBAL SYSTEM (AUTH & LOGOUT)
        // =========================================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html'; 
                return null;
            }
            return session;
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // =========================================================
        // 2. LOGIKA CRUD SPESIFIK TABEL PRESTASI 
        // =========================================================
        let modeForm = "tambah"; 
        let dataPrestasiGlobal = [];

        async function loadPrestasi() {
            const { data, error } = await supabase
                .from('prestasi')
                .select('*')
                .order('tahun', { ascending: false }); // Diurutkan berdasarkan Tahun terbaru

            if (error) { 
                console.error("Gagal memuat data prestasi: ", error.message); 
                return; 
            }

            dataPrestasiGlobal = data; 
            const tbody = document.getElementById('tabel-prestasi');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Belum ada data prestasi yang dicatat.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map((item, index) => `
                <tr>
                    <td>
                        <b>${item.judul || ''}</b><br>
                        <small style="color:#666;">${item.deskripsi || ''}</small>
                        ${item.foto_url ? `<br><a href="${item.foto_url}" target="_blank" style="font-size:12px; color:blue;">[Lihat Foto]</a>` : ''}
                    </td>
                    <td style="text-align:center;">${item.tingkat || ''}</td>
                    <td style="text-align:center;">${item.tahun || ''}</td>
                    <td style="text-align:center;">
                        <button onclick="persiapkanEditByIndex(${index})">Edit</button>
                        <button onclick="hapusPrestasi('${item.id}')">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('form-prestasi').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('prestasi-id').value;
            
            // Payload menyesuaikan spesifikasi kolom Database Supabase
            const formData = {
                judul: document.getElementById('input-judul').value,
                tingkat: document.getElementById('input-tingkat').value,
                tahun: parseInt(document.getElementById('input-tahun').value), // Pastikan berupa Angka/Integer
                foto_url: document.getElementById('input-foto').value || null,
                deskripsi: document.getElementById('input-deskripsi').value || null
            };

            const btnSimpan = document.getElementById('btn-simpan');
            btnSimpan.disabled = true;

            if (modeForm === "tambah") {
                const { error } = await supabase.from('prestasi').insert([formData]);
                if (error) {
                    alert("Gagal menambah data prestasi: " + error.message);
                    btnSimpan.disabled = false;
                    return; 
                }
            } else {
                const { error } = await supabase.from('prestasi').update(formData).eq('id', id);
                if (error) {
                    alert("Gagal memperbarui data prestasi: " + error.message);
                    btnSimpan.disabled = false;
                    return; 
                }
            }

            btnSimpan.disabled = false;
            tutupForm();
            loadPrestasi(); 
        });

        async function hapusPrestasi(id) {
            if (!confirm('Yakin ingin menghapus catatan prestasi ini secara permanen?')) return;
            
            const { error } = await supabase.from('prestasi').delete().eq('id', id);
            if (error) {
                alert("Gagal menghapus prestasi: " + error.message);
            } else {
                loadPrestasi(); 
            }
        }

        // =========================================================
        // 3. LOGIKA UPLOAD KE STORAGE SUPABASE
        // =========================================================
        async function uploadGambar(file, bucket) {
            const namaFile = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
            
            const { data, error } = await supabase.storage
                .from(bucket) 
                .upload(namaFile, file);

            if (error) {
                console.error('Upload gagal:', error.message);
                alert("Proses upload gagal: " + error.message);
                return null;
            }

            const { data: { publicUrl } } = supabase.storage
                .from(bucket)
                .getPublicUrl(namaFile);

            return publicUrl;
        }

        document.getElementById('input-file-foto').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const labelStatus = document.getElementById('status-upload');
            const btnSimpan = document.getElementById('btn-simpan');

            labelStatus.style.display = "block";
            labelStatus.style.color = "blue";
            labelStatus.innerText = "Sedang mengunggah file ke storage...";
            btnSimpan.disabled = true; 

            const url = await uploadGambar(file, 'prestasi-images');

            if (url) {
                document.getElementById('input-foto').value = url;
                
                const previewImg = document.getElementById('preview-foto');
                previewImg.src = url;
                previewImg.style.display = "block";
                
                labelStatus.innerText = "Upload Berhasil!";
                labelStatus.style.color = "green";
            } else {
                labelStatus.innerText = "Upload Gagal!";
                labelStatus.style.color = "red";
            }
            btnSimpan.disabled = false; 
        });

        // =========================================================
        // 4. FUNGSI PEMBANTU INTERFACE (UI HELPER)
        // =========================================================
        function bukaFormTambah() {
            modeForm = "tambah";
            document.getElementById('judul-form').innerText = "Tambah Prestasi Baru";
            document.getElementById('form-prestasi').reset();
            
            document.getElementById('prestasi-id').value = "";
            document.getElementById('input-foto').value = "";
            document.getElementById('input-file-foto').value = "";
            document.getElementById('preview-foto').style.display = "none";
            document.getElementById('preview-foto').src = "";
            document.getElementById('status-upload').style.display = "none";

            document.getElementById('area-form').style.display = "block";
        }

        function persiapkanEditByIndex(index) {
            const item = dataPrestasiGlobal[index];
            if (!item) return;

            modeForm = "edit";
            document.getElementById('judul-form').innerText = "Edit / Ubah Data Prestasi";
            document.getElementById('area-form').style.display = "block";
            
            document.getElementById('prestasi-id').value = item.id;
            document.getElementById('input-judul').value = item.judul || "";
            document.getElementById('input-tingkat').value = item.tingkat || "";
            document.getElementById('input-tahun').value = item.tahun || "";
            document.getElementById('input-deskripsi').value = item.deskripsi || "";
            
            // Urusan foto
            document.getElementById('input-foto').value = item.foto_url || "";
            document.getElementById('input-file-foto').value = ""; 
            
            const previewImg = document.getElementById('preview-foto');
            if (item.foto_url && item.foto_url !== "null" && item.foto_url !== "") {
                previewImg.src = item.foto_url;
                previewImg.style.display = "block";
            } else {
                previewImg.style.display = "none";
                previewImg.src = "";
            }
            document.getElementById('status-upload').style.display = "none";
        }

        function tutupForm() {
            document.getElementById('area-form').style.display = "none";
            document.getElementById('form-prestasi').reset();
            document.getElementById('prestasi-id').value = "";
            document.getElementById('input-foto').value = "";
            document.getElementById('input-file-foto').value = "";
            document.getElementById('preview-foto').style.display = "none";
            document.getElementById('status-upload').style.display = "none";
        }

        async function init() {
            const session = await checkAuth();
            if (session) {
                loadPrestasi();
            }
        }
        init();
    </script>
</body>
</html>
