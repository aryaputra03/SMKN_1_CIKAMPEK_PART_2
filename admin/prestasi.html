<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Prestasi - Admin SMKN 1 Cikampek</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="berita.html">Berita</a></li>
            <li><a href="prestasi.html">Prestasi</a></li>
            <li><a href="guru.html">Guru & Lulusan</a></li>
            <li><a href="banner.html">Banner</a></li>
            <li><a href="bos.html">Laporan BOS</a></li>
            <li><a href="apbd.html">Laporan APBD</a></li>
            <li><a href="visi-misi.html">Visi Misi</a></li>
            <li><a href="kurikulum.html">Kurikulum</a></li>
            <li><button onclick="logout()">Logout</button></li>
        </ul>
    </nav>

    <main id="content">
        <h1>Pengelolaan Data Prestasi Sekolah & Siswa</h1>
        <button onclick="bukaFormTambah()">+ Tambah Prestasi Baru</button>
        <br><br>

        <div id="area-form" style="display: none; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; max-width: 600px;">
            <h3 id="judul-form">Tambah Prestasi</h3>
            <form id="form-prestasi">
                <input type="hidden" id="prestasi-id">
                
                <div>
                    <label>Judul Prestasi / Nama Perlombaan:</label><br>
                    <input type="text" id="input-judul" required style="width: 100%;" placeholder="Contoh: Juara 1 LKS Otomotif Tingkat Provinsi">
                </div><br>

                <div>
                    <label>Nama Pemenang (Siswa/Tim/Guru):</label><br>
                    <input type="text" id="input-pemenang" required style="width: 100%;" placeholder="Contoh: Ahmad Rifai (Kelas XII TKR 1)">
                </div><br>
                
                <div>
                    <label>Kategori Prestasi:</label><br>
                    <select id="input-kategori" required style="width: 100%; padding: 5px;">
                        <option value="">-- Pilih Kategori --</option>
                        <option value="Akademik">Akademik</option>
                        <option value="Non-Akademik">Non-Akademik</option>
                        <option value="Sains & Teknologi">Sains & Teknologi</option>
                        <option value="Olahraga">Olahraga</option>
                        <option value="Seni & Budaya">Seni & Budaya</option>
                    </select>
                </div><br>
                
                <div>
                    <label>Tanggal Perolehan Penghargaan:</label><br>
                    <input type="date" id="input-tanggal" required>
                </div><br>
                
                <div>
                    <label>Upload Foto Dokumentasi Prestasi:</label><br>
                    <input type="file" id="input-file-foto" accept="image/*" style="width: 100%;">
                    
                    <input type="hidden" id="input-foto">
                    
                    <br>
                    <img id="preview-foto" style="max-width: 200px; margin-top: 10px; display: none; border-radius: 5px; border: 1px solid #ddd;">
                    <small id="status-upload" style="color: blue; display: none; font-weight: bold; margin-top: 5px;"></small>
                </div><br>
                
                <div>
                    <label>Deskripsi Ringkas / Cerita Kemenangan:</label><br>
                    <textarea id="input-deskripsi" rows="6" required style="width: 100%; font-family: Arial, sans-serif;"></textarea>
                </div><br>
                
                <button type="submit">Simpan Data Prestasi</button>
                <button type="button" onclick="tutupForm()">Batal</button>
            </form>
        </div>

        <table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th>Judul Prestasi & Pemenang</th>
                    <th>Kategori</th>
                    <th>Tanggal</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-prestasi">
                </tbody>
        </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    
    <script>
        // =========================================================
        // 1. GLOBAL SYSTEM (AUTH & LOGOUT)
        // =========================================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html'; 
            }
            return session;
        }
        checkAuth();

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // =========================================================
        // 2. LOGIKA CRUD SPESIFIK TABEL PRESTASI 
        // =========================================================
        let modeForm = "tambah"; 

        async function loadPrestasi() {
            const { data, error } = await supabase
                .from('prestasi')
                .select('*')
                .order('tanggal', { ascending: false });

            if (error) { 
                console.error("Gagal memuat data prestasi: ", error.message); 
                return; 
            }

            const tbody = document.getElementById('tabel-prestasi');
            
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Belum ada data prestasi yang dicatat.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>
                        <b>${item.judul}</b><br>
                        <small style="color:#28a745; font-weight:bold;">Pemenang: ${item.pemenang}</small><br>
                        <small style="color:#666;">Slug: ${item.slug}</small>
                    </td>
                    <td style="text-align:center;">${item.kategori}</td>
                    <td style="text-align:center;">${item.tanggal}</td>
                    <td style="text-align:center;">
                        <button onclick="persiapkanEdit('${item.id}', \`${escapeJS(item.judul)}\`, \`${escapeJS(item.pemenang)}\`, '${item.kategori}', '${item.tanggal}', '${item.foto_url || ''}', \`${escapeJS(item.deskripsi)}\`)">Edit</button>
                        <button onclick="hapusPrestasi('${item.id}')">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('form-prestasi').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('prestasi-id').value;
            const judulInput = document.getElementById('input-judul').value;
            
            const slugOtomatis = judulInput
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '') 
                .replace(/\s+/g, '-');        

            const formData = {
                judul: judulInput,
                slug: slugOtomatis,
                pemenang: document.getElementById('input-pemenang').value,
                kategori: document.getElementById('input-kategori').value,
                tanggal: document.getElementById('input-tanggal').value,
                foto_url: document.getElementById('input-foto').value || null, // Diambil dari hidden input hasil upload
                deskripsi: document.getElementById('input-deskripsi').value
            };

            if (modeForm === "tambah") {
                const { error } = await supabase.from('prestasi').insert([formData]);
                if (error) alert("Gagal menambah data prestasi: " + error.message);
            } else {
                const { error } = await supabase.from('prestasi').update(formData).eq('id', id);
                if (error) alert("Gagal memperbarui data prestasi: " + error.message);
            }

            tutupForm();
            loadPrestasi(); 
        });

        async function hapusPrestasi(id) {
            if (!confirm('Yakin ingin menghapus catatan prestasi ini secara permanen?')) return;
            
            const { error } = await supabase.from('prestasi').delete().eq('id', id);
            if (error) {
                alert("Gagal menghapus prestasi: " + error.message);
            } else {
                loadPrestasi(); 
            }
        }

        // =========================================================
        // IMPLEMENTASI LANGKAH 6: LOGIKA UPLOAD KE STORAGE SUPABASE
        // =========================================================
        async function uploadGambar(file, bucket) {
            // Buat nama file unik untuk menghindari konflik nama yang sama
            const namaFile = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
            
            const { data, error } = await supabase.storage
                .from(bucket) 
                .upload(namaFile, file);

            if (error) {
                console.error('Upload gagal:', error.message);
                alert("Proses upload gagal: " + error.message);
                return null;
            }

            // Ambil URL publik gambar untuk disimpan ke tabel database
            const { data: { publicUrl } } = supabase.storage
                .from(bucket)
                .getPublicUrl(namaFile);

            return publicUrl;
        }

        // Listener Otomatis saat Admin Memilih File Gambar dari Komputer
        document.getElementById('input-file-foto').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const labelStatus = document.getElementById('status-upload');
            labelStatus.style.display = "block";
            labelStatus.style.color = "blue";
            labelStatus.innerText = "Sedang mengunggah file ke storage...";

            // Memanggil fungsi upload dengan parameter mapping bucket 'prestasi-images'
            const url = await uploadGambar(file, 'prestasi-images');

            if (url) {
                // Simpan URL publik ke hidden input agar terbaca saat disubmit
                document.getElementById('input-foto').value = url;
                
                // Tampilkan preview gambar di bawah form
                const previewImg = document.getElementById('preview-foto');
                previewImg.src = url;
                previewImg.style.display = "block";
                
                labelStatus.innerText = "Upload Berhasil!";
                labelStatus.style.color = "green";
            } else {
                labelStatus.style.display = "none";
            }
        });

        // =========================================================
        // 3. FUNGSI PEMBANTU INTERFACE (UI HELPER)
        // =========================================================
        function bukaFormTambah() {
            modeForm = "tambah";
            document.getElementById('judul-form').innerText = "Tambah Prestasi Baru";
            document.getElementById('form-prestasi').reset();
            document.getElementById('prestasi-id').value = "";
            
            // Bersihkan sisa elemen file & preview lama
            document.getElementById('input-foto').value = "";
            document.getElementById('input-file-foto').value = "";
            document.getElementById('preview-foto').style.display = "none";
            document.getElementById('preview-foto').src = "";
            document.getElementById('status-upload').style.display = "none";

            document.getElementById('area-form').style.display = "block";
        }

        function persiapkanEdit(id, judul, pemenang, kategori, tanggal, foto, deskripsi) {
            modeForm = "edit";
            document.getElementById('judul-form').innerText = "Edit / Ubah Data Prestasi";
            document.getElementById('area-form').style.display = "block";
            
            document.getElementById('prestasi-id').value = id;
            document.getElementById('input-judul').value = judul;
            document.getElementById('input-pemenang').value = pemenang;
            document.getElementById('input-kategori').value = kategori;
            document.getElementById('input-tanggal').value = tanggal;
            document.getElementById('input-deskripsi').value = deskripsi;

            // Set URL foto lama ke hidden input
            document.getElementById('input-foto').value = foto;
            document.getElementById('input-file-foto').value = ""; // Reset picker file
            
            // Rekonstruksi preview gambar jika data lama memiliki foto
            const previewImg = document.getElementById('preview-foto');
            if (foto && foto !== "null" && foto !== "") {
                previewImg.src = foto;
                previewImg.style.display = "block";
            } else {
                previewImg.style.display = "none";
                previewImg.src = "";
            }
            document.getElementById('status-upload').style.display = "none";
        }

        function tutupForm() {
            document.getElementById('area-form').style.display = "none";
            document.getElementById('form-prestasi').reset();
            document.getElementById('input-file-foto').value = "";
            document.getElementById('preview-foto').style.display = "none";
            document.getElementById('status-upload').style.display = "none";
        }

        function escapeJS(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        loadPrestasi();
    </script>
</body>
</html>
