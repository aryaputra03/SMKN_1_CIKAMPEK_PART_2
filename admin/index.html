<!-- admin/index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Admin — SMKN 1 Cikampek</title>
  <!-- CSS sesuai desain existing (navy + kuning) -->
</head>
<body>
  <script>
    // Letakkan ini di awal <script> setiap halaman admin
    async function checkAuth() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        window.location.href = 'index.html'; // redirect ke login
    }
    return session;
    }

    // Panggil di setiap halaman admin
    checkAuth();
  </script> 
  <form id="login-form">
    <input type="email" id="email" placeholder="Email Admin" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Masuk</button>
    <p id="error-msg" style="color:red;display:none"></p>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script>
    // Jika sudah login, langsung ke dashboard
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        document.getElementById('error-msg').textContent = 'Email atau password salah.';
        document.getElementById('error-msg').style.display = 'block';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
