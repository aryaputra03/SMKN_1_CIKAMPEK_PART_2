<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Berita - Admin SMKN 1 Cikampek</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/berita.css">
</head>
<body>
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="berita.html">Berita</a></li>
            <li><a href="prestasi.html">Prestasi</a></li>
            <li><a href="guru.html">Guru & Staff</a></li>
            <li><a href="lulusan.html">Lulusan Terbaik</a></li>
            <li><a href="banner.html">Banner</a></li>
            <li><a href="visi-misi.html">Visi Misi</a></li>
            <li><a href="kurikulum_url.html">Kurikulum</a></li>
            <li><a href="struktur_organisasi.html">Struktur Organisasi</a></li>
            <li><a href="video.html">Video Profil</a></li>
            <li><button onclick="logout()">Logout</button></li>
        </ul>
    </nav>

    <main id="content">
        <h1>Kelola Berita Sekolah</h1>
        <button onclick="bukaFormTambah()">+ Tambah Berita Baru</button>
        <br><br>

        <div id="area-form" style="display: none; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; max-width: 600px;">
            <h3 id="judul-form">Tambah Berita</h3>
            <form id="form-berita">
                <input type="hidden" id="berita-id">
                
                <div>
                    <label>Judul Berita:</label><br>
                    <input type="text" id="input-judul" required style="width: 100%;">
                </div><br>
                
                <div>
                    <label>Kategori Berita:</label><br>
                    <select id="input-kategori" required style="width: 100%; padding: 5px;">
                        <option value="">-- Pilih Kategori --</option>
                        <option value="Pengumuman">Pengumuman</option>
                        <option value="Kegiatan Sekolah">Kegiatan Sekolah</option>
                        <option value="Berita Umum">Berita Umum</option> 
                        <option value="Artikel & Opini">Artikel / Opini</option>
                        <option value="Info Kelulusan">Info Kelulusan</option>
                        <option value="Lainnya">Lainnya</option> 
                    </select>
                </div><br>
                
                <div>
                    <label>Tanggal Publikasi:</label><br>
                    <input type="date" id="input-tanggal" required>
                </div><br>
                
                <div>
                    <label>Upload Foto Sampul Berita (Maks 3 MB):</label><br>
                    <input type="file" id="input-file-foto" accept="image/*" style="width: 100%;">
                    
                    <input type="hidden" id="input-foto">
                    
                    <br>
                    <img id="preview-foto" style="max-width: 200px; margin-top: 10px; display: none; border-radius: 5px; border: 1px solid #ddd;">
                    <small id="status-upload" style="color: blue; display: none; font-weight: bold; margin-top: 5px;"></small>
                </div><br>
                
                <div>
                    <label>Isi Konten Berita:</label><br>
                    <textarea id="input-isi" rows="8" required style="width: 100%; font-family: Arial, sans-serif;"></textarea>
                </div><br>
                
                <button type="submit">Simpan Berita</button>
                <button type="button" onclick="tutupForm()">Batal</button>
            </form>
        </div>

        <table border="1" cellpadding="8" cellspacing="0" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th>Judul Berita</th>
                    <th style="width: 100px; text-align:center;">Gambar Sampul</th>
                    <th>Kategori</th>
                    <th>Tanggal</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-berita">
            </tbody>
        </table>
    </main>

    <div id="modalFotoBerita" class="modal">
        <span class="close" onclick="tutupModal()">&times;</span>
        <img class="modal-content" id="imgModalTarget">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-client.js"></script>
    
    <script>
        // =========================================================
        // 1. GLOBAL SYSTEM (AUTH & LOGOUT)
        // =========================================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html';
            }
            return session;
        }
        checkAuth();

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // =========================================================
        // 2. KODE CRUD SPESIFIK MODUL BERITA 
        // =========================================================
        let modeForm = "tambah";

        // --- READ — Tampilkan daftar data berita ---
        async function loadBerita() {
            const { data, error } = await supabase
                .from('berita')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) { 
                console.error("Gagal memuat berita: ", error.message); 
                return; 
            }

            const tbody = document.getElementById('tabel-berita');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Belum ada berita yang diterbitkan.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><b>${item.judul}</b><br><small style="color:#666;">Slug: ${item.slug}</small></td>
                    <td style="text-align:center;">
                        ${item.foto_url ? `<img src="${item.foto_url}" alt="Foto Berita" class="img-thumbnail" onclick="bukaModal('${item.foto_url}')" title="Klik untuk memperbesar">` : '<span style="color:#999; font-style:italic; font-size:12px;">Tanpa Gambar</span>'}
                    </td>
                    <td style="text-align:center;">${item.kategori}</td>
                    <td style="text-align:center;">${item.tanggal}</td>
                    <td style="text-align:center;">
                        <button onclick="persiapkanEdit('${item.id}', \`${escapeJS(item.judul)}\`, '${item.kategori}', '${item.tanggal}', '${item.foto_url || ''}', \`${escapeJS(item.isi)}\`)">Edit</button>
                        <button onclick="hapusBerita('${item.id}')">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        // --- INTERCEPT SUBMIT FORM (CREATE & UPDATE) ---
        document.getElementById('form-berita').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('berita-id').value;
            const judulInput = document.getElementById('input-judul').value;
            
            const slugOtomatis = judulInput
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-');

            const formData = {
                judul: judulInput,
                slug: slugOtomatis,
                isi: document.getElementById('input-isi').value,
                kategori: document.getElementById('input-kategori').value,
                tanggal: document.getElementById('input-tanggal').value,
                foto_url: document.getElementById('input-foto').value || null 
            };

            if (modeForm === "tambah") {
                const { error } = await supabase.from('berita').insert([formData]);
                if (error) alert("Gagal menambah berita: " + error.message);
            } else {
                const { error } = await supabase.from('berita').update(formData).eq('id', id);
                if (error) alert("Gagal memperbarui berita: " + error.message);
            }

            tutupForm();
            loadBerita();
        });

        // --- DELETE — Hapus data berita ---
        async function hapusBerita(id) {
            if (!confirm('Yakin ingin menghapus berita ini secara permanen?')) return;
            
            const { error } = await supabase.from('berita').delete().eq('id', id);
            if (error) {
                alert("Gagal menghapus berita: " + error.message);
            } else {
                loadBerita();
            }
        }

        // =========================================================
        // IMPLEMENTASI LOGIKA UPLOAD KE STORAGE SUPABASE
        // =========================================================
        async function uploadGambar(file, bucket) {
            const namaFile = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
            
            const { data, error } = await supabase.storage
                .from(bucket)
                .upload(namaFile, file);

            if (error) {
                console.error('Upload gagal:', error.message);
                alert("Proses upload gagal: " + error.message);
                return null;
            }

            const { data: { publicUrl } } = supabase.storage
                .from(bucket)
                .getPublicUrl(namaFile);

            return publicUrl;
        }

        document.getElementById('input-file-foto').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // --- VALIDASI UKURAN FILE (MAKSIMAL 3 MB) ---
            const maksUkuran = 3 * 1024 * 1024; // 3 MB dalam satuan Bytes
            if (file.size > maksUkuran) {
                alert("⚠️ Ukuran file terlalu besar! Maksimal ukuran gambar yang diperbolehkan adalah 3 MB.");
                e.target.value = ""; // Mengosongkan kembali input file
                return; // Membatalkan proses upload selanjutnya
            }

            const labelStatus = document.getElementById('status-upload');
            labelStatus.style.display = "block";
            labelStatus.style.color = "blue";
            labelStatus.innerText = "Sedang mengunggah file ke storage...";

            const url = await uploadGambar(file, 'berita-images');

            if (url) {
                document.getElementById('input-foto').value = url;
                
                const previewImg = document.getElementById('preview-foto');
                previewImg.src = url;
                previewImg.style.display = "block";
                
                labelStatus.innerText = "Upload Berhasil!";
                labelStatus.style.color = "green";
            } else {
                labelStatus.style.display = "none";
            }
        });

        // =========================================================
        // 3. FUNGSI PEMBANTU INTERFACE (UI APP HELPER & MODAL)
        // =========================================================
        function bukaFormTambah() {
            modeForm = "tambah";
            document.getElementById('judul-form').innerText = "Tambah Berita Baru";
            document.getElementById('form-berita').reset();
            document.getElementById('berita-id').value = "";
            
            document.getElementById('input-foto').value = "";
            document.getElementById('input-file-foto').value = "";
            document.getElementById('preview-foto').style.display = "none";
            document.getElementById('preview-foto').src = "";
            document.getElementById('status-upload').style.display = "none";

            document.getElementById('area-form').style.display = "block";
        }

        function persiapkanEdit(id, judul, kategori, tanggal, foto, isi) {
            modeForm = "edit";
            document.getElementById('judul-form').innerText = "Edit / Ubah Berita";
            document.getElementById('area-form').style.display = "block";
            
            document.getElementById('berita-id').value = id;
            document.getElementById('input-judul').value = judul;
            document.getElementById('input-kategori').value = kategori;
            document.getElementById('input-tanggal').value = tanggal;
            
            document.getElementById('input-foto').value = foto;
            document.getElementById('input-file-foto').value = ""; 
            
            const previewImg = document.getElementById('preview-foto');
            if (foto && foto !== "null" && foto !== "") {
                previewImg.src = foto;
                previewImg.style.display = "block";
            } else {
                previewImg.style.display = "none";
                previewImg.src = "";
            }
            document.getElementById('status-upload').style.display = "none";
            
            document.getElementById('input-isi').value = isi;
        }

        function tutupForm() {
            document.getElementById('area-form').style.display = "none";
            document.getElementById('form-berita').reset();
            document.getElementById('input-file-foto').value = "";
            document.getElementById('preview-foto').style.display = "none";
            document.getElementById('status-upload').style.display = "none";
        }

        // --- FUNGSI MODAL ZOOM GAMBAR ---
        function bukaModal(imgUrl) {
            const modal = document.getElementById("modalFotoBerita");
            const modalImg = document.getElementById("imgModalTarget");
            modal.style.display = "block";
            modalImg.src = imgUrl;
        }

        function tutupModal() {
            document.getElementById("modalFotoBerita").style.display = "none";
        }

        window.onclick = function(event) {
            const modal = document.getElementById("modalFotoBerita");
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }

        function escapeJS(str) {
            return str.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        loadBerita();

        // ---------------------------------------------------------
        // LOGIKA SIDEBAR HAMBURGER (MOBILE)
        // ---------------------------------------------------------
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.querySelector('nav');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleSidebar() {
            navMenu.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
            menuToggle.classList.toggle('geser-kanan');
            if (navMenu.classList.contains('active')) {
                menuToggle.innerHTML = '✕';
            } else {
                menuToggle.innerHTML = '☰';
            }
        }

        menuToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
