<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judul Halaman - Admin SMKN 1 Cikampek</title>
    </head>
<body>
    <nav>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="berita.html">Berita</a></li>
            <li><a href="prestasi.html">Prestasi</a></li>
            <li><a href="guru.html">Guru & Lulusan</a></li>
            <li><a href="banner.html">Banner</a></li>
            <li><a href="bos.html">Laporan BOS</a></li>
            <li><a href="apbd.html">Laporan APBD</a></li>
            <li><a href="visi-misi.html">Visi Misi</a></li>
            <li><a href="kurikulum.html">Kurikulum</a></li>
            <li><button onclick="logout()">Logout</button></li>
        </ul>
    </nav>

    <main id="content">
        <h1>Dashboard Admin</h1>
<div class="widget-container">
    <div class="widget">
        <h3>Total Berita</h3>
        <p id="count-berita">0</p>
    </div>
    <div class="widget">
        <h3>Total Prestasi</h3>
        <p id="count-prestasi">0</p>
    </div>
    <div class="widget">
        <h3>Total Guru</h3>
        <p id="count-guru">0</p>
    </div>
</div>
        </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-client.js"></script>
    
<script>
        // Cek Otorisasi Login
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'index.html'; 
            }
            return session;
        }

        // Fungsi Logout
        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        // Jalankan proteksi halaman dahulu
        checkAuth();

        // -----------------------------------------------------------------
        // DI SINI TEMPAT SPESIFIK UNTUK MENARUH KODE LANGKAH 4 (DASHBOARD)
        // -----------------------------------------------------------------
        async function loadDashboardData() {
            // 1. Mengambil jumlah data berita
            const { count: jumlahBerita } = await supabase
                .from('berita')
                .select('*', { count: 'exact', head: true });

            // 2. Mengambil jumlah data prestasi
            const { count: jumlahPrestasi } = await supabase
                .from('prestasi')
                .select('*', { count: 'exact', head: true });

            // 3. Mengambil jumlah data guru
            const { count: jumlahGuru } = await supabase
                .from('guru')
                .select('*', { count: 'exact', head: true });

            // 4. Mengambil jumlah data banner yang statusnya aktif saja
            const { count: jumlahBanner } = await supabase
                .from('banner')
                .select('*', { count: 'exact', head: true })
                .eq('aktif', true); // Hanya menghitung banner yang aktif sesuai instruksi

            // Menampilkan hasil hitungan ke element HTML berdasarkan ID-nya
            document.getElementById('count-berita').innerText = jumlahBerita ?? 0;
            document.getElementById('count-prestasi').innerText = jumlahPrestasi ?? 0;
            document.getElementById('count-guru').innerText = jumlahGuru ?? 0;
            document.getElementById('count-banner').innerText = jumlahBanner ?? 0;
        }

        // Panggil fungsi hitung data di atas setelah halaman selesai dimuat
        loadDashboardData();
        // -----------------------------------------------------------------
    </script>
</body>
</html>
